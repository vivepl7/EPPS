<section style="max-width: 600px; margin: 60px auto; padding: 40px; background-color: #0f172a; border-radius: 12px; color: white; font-family: Arial, sans-serif;">

  <h2 style="text-align: center; margin-bottom: 10px;">Request Consultation</h2>
  <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">
    Esteban Perez Professional Services (EPPS)
  </p>

  <form action="https://api.web3forms.com/submit" method="POST">
    
    <!-- ACCESS KEY -->
    <input type="hidden" name="access_key" value="7ab326f3-0e65-4f88-9026-f2dbe07d4223">

    <!-- SUBJECT (opcional pero PRO) -->
    <input type="hidden" name="subject" value="New Client Request - EPPS">

    <!-- NAME -->
    <input 
      type="text" 
      name="name" 
      placeholder="Full Name" 
      required 
      style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: none;"
    >

    <!-- EMAIL -->
    <input 
      type="email" 
      name="email" 
      placeholder="Email Address" 
      required 
      style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: none;"
    >

    <!-- MESSAGE -->
    <textarea 
      name="message" 
      placeholder="How can we help you? (Tax Services, Business Consulting, Digital Solutions)"
      required 
      style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: none; height: 120px;"
    ></textarea>

    <!-- BUTTON -->
    <button 
      type="submit" 
      style="width: 100%; padding: 14px; background-color: #1e3a8a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;"
    >
      Submit Request
    </button>

  </form>

</section>
